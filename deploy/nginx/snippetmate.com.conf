server {
    listen 80;
    server_name snippetmate.com www.snippetmate.com;
    include /etc/nginx/snippets/acme-http-01.conf;
    return 301 https://www.snippetmate.com$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    server_name snippetmate.com;
    ssl_certificate     /etc/letsencrypt/live/snippetmate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snippetmate.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /etc/nginx/conf.d/cloudflare_real_ip.conf;
    return 301 https://www.snippetmate.com$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    server_name www.snippetmate.com;
    ssl_certificate     /etc/letsencrypt/live/snippetmate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snippetmate.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /etc/nginx/conf.d/cloudflare_real_ip.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/zk/projects/SnippetMate/frontend/dist;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass http://127.0.0.1:5010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_connect_timeout 15s;
        client_max_body_size 25m;
    }

    location ~* (?i)(^|/)(\.env|\.git|\.htaccess|\.DS_Store|\.aws|credentials|composer\.json)$ { return 444; }
    location ~* (?i)\.(ya?ml|ini|sql|bak|old|log|config)$ { return 444; }

    access_log /var/log/nginx/snippetmate.com.access.log;
    error_log  /var/log/nginx/snippetmate.com.error.log warn;
}
